<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 750" width="1400" height="750">
  <defs>
    <style>
      .table-box { fill: #ffffff; stroke: #333; stroke-width: 2; }
      .table-header { fill: #2c3e50; }
      .pk-row { fill: #fff9e6; stroke: #ddd; stroke-width: 1; }
      .fk-row { fill: #ffe6e6; stroke: #ddd; stroke-width: 1; }
      .normal-row { fill: #f8f8f8; stroke: #ddd; stroke-width: 1; }
      .text-white { fill: white; font-weight: bold; font-size: 14px; }
      .text-black { fill: black; font-size: 12px; font-family: 'Monaco', monospace; }
      .text-label { fill: black; font-size: 12px; font-family: Arial; }
      .rel-line { stroke: #3498db; stroke-width: 2.5; fill: none; }
      .rel-label { fill: #2c3e50; font-size: 11px; font-weight: bold; background: white; }
      .legend-label { fill: black; font-size: 12px; }
    </style>
    <marker id="arrow-end" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#3498db"/>
    </marker>
  </defs>

  <!-- Título -->
  <text x="700" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#2c3e50">
    Logística - Diagrama Relacional SQLite
  </text>

  <!-- ===== TABLA: CENTERS ===== -->
  <rect x="50" y="80" width="280" height="40" class="table-header"/>
  <text x="190" y="108" text-anchor="middle" class="text-white">centers</text>

  <rect x="50" y="120" width="280" height="30" class="pk-row"/>
  <text x="60" y="141" class="text-black">* center_id TEXT PRIMARY KEY</text>

  <rect x="50" y="150" width="280" height="30" class="normal-row"/>
  <text x="60" y="171" class="text-black">name TEXT NOT NULL</text>

  <rect x="50" y="180" width="280" height="30" class="normal-row"/>
  <text x="60" y="201" class="text-black">location TEXT NOT NULL</text>

  <!-- ===== TABLA: ROUTES ===== -->
  <rect x="450" y="80" width="320" height="40" class="table-header"/>
  <text x="610" y="108" text-anchor="middle" class="text-white">routes</text>

  <rect x="450" y="120" width="320" height="30" class="pk-row"/>
  <text x="460" y="141" class="text-black">* route_id TEXT PRIMARY KEY</text>

  <rect x="450" y="150" width="320" height="30" class="fk-row"/>
  <text x="460" y="171" class="text-black">origin_center_id TEXT (FK -> centers)</text>

  <rect x="450" y="180" width="320" height="30" class="fk-row"/>
  <text x="460" y="201" class="text-black">destination_center_id TEXT (FK -> centers)</text>

  <rect x="450" y="210" width="320" height="30" class="normal-row"/>
  <text x="460" y="231" class="text-black">active INTEGER NOT NULL</text>

  <!-- ===== TABLA: SHIPMENTS ===== -->
  <rect x="900" y="80" width="420" height="40" class="table-header"/>
  <text x="1110" y="108" text-anchor="middle" class="text-white">shipments</text>

  <rect x="900" y="120" width="420" height="30" class="pk-row"/>
  <text x="910" y="141" class="text-black">* tracking_code TEXT PRIMARY KEY</text>

  <rect x="900" y="150" width="420" height="30" class="normal-row"/>
  <text x="910" y="171" class="text-black">sender TEXT NOT NULL</text>

  <rect x="900" y="180" width="420" height="30" class="normal-row"/>
  <text x="910" y="201" class="text-black">recipient TEXT NOT NULL</text>

  <rect x="900" y="210" width="420" height="30" class="normal-row"/>
  <text x="910" y="231" class="text-black">current_status TEXT NOT NULL</text>

  <rect x="900" y="240" width="420" height="30" class="normal-row"/>
  <text x="910" y="261" class="text-black">priority INTEGER NOT NULL</text>

  <rect x="900" y="270" width="420" height="30" class="fk-row"/>
  <text x="910" y="291" class="text-black">assigned_route TEXT (FK -> routes)</text>

  <rect x="900" y="300" width="420" height="30" class="normal-row"/>
  <text x="910" y="321" class="text-black">status_history TEXT (JSON array)</text>

  <rect x="900" y="330" width="420" height="30" class="normal-row"/>
  <text x="910" y="351" class="text-black">shipment_type TEXT NOT NULL</text>

  <!-- ===== TABLA: CENTER_INVENTORY ===== -->
  <rect x="450" y="450" width="420" height="40" class="table-header"/>
  <text x="660" y="478" text-anchor="middle" class="text-white">center_inventory</text>

  <rect x="450" y="490" width="420" height="30" class="fk-row"/>
  <text x="460" y="511" class="text-black">center_id TEXT (PK, FK -> centers)</text>

  <rect x="450" y="520" width="420" height="30" class="fk-row"/>
  <text x="460" y="541" class="text-black">tracking_code TEXT (PK, FK -> shipments)</text>

  <rect x="450" y="550" width="420" height="30" class="normal-row"/>
  <text x="460" y="571" class="text-black">received_at TEXT (timestamp ISO)</text>

  <!-- ===== RELACIONES (FLECHAS) ===== -->

  <!-- Centers -> Routes (origin_center_id) -->
  <line x1="330" y1="150" x2="450" y2="165" class="rel-line" marker-end="url(#arrow-end)"/>
  <text x="385" y="145" text-anchor="middle" class="rel-label">1:N</text>

  <!-- Centers -> Routes (destination_center_id) -->
  <line x1="330" y1="180" x2="450" y2="195" class="rel-line" marker-end="url(#arrow-end)"/>
  <text x="385" y="200" text-anchor="middle" class="rel-label">1:N</text>

  <!-- Routes -> Shipments (assigned_route) -->
  <path d="M 770 240 Q 835 260 900 285" class="rel-line" marker-end="url(#arrow-end)"/>
  <text x="835" y="255" text-anchor="middle" class="rel-label">1:N</text>

  <!-- Centers -> Center_inventory -->
  <line x1="190" y1="210" x2="555" y2="490" class="rel-line" marker-end="url(#arrow-end)"/>
  <text x="310" y="350" text-anchor="middle" class="rel-label">1:N</text>

  <!-- Shipments -> Center_inventory -->
  <line x1="1110" y1="360" x2="870" y2="520" class="rel-line" marker-end="url(#arrow-end)"/>
  <text x="1000" y="445" text-anchor="middle" class="rel-label">1:N</text>

  <!-- ===== LEYENDA ===== -->
  <rect x="50" y="680" width="1300" height="60" fill="#f0f0f0" stroke="#999" stroke-width="1" rx="5"/>

  <rect x="70" y="695" width="20" height="20" class="pk-row" stroke="#333" stroke-width="1"/>
  <text x="100" y="710" class="legend-label">* Clave Primaria (identifica filas de forma unica)</text>

  <rect x="550" y="695" width="20" height="20" class="fk-row" stroke="#333" stroke-width="1"/>
  <text x="580" y="710" class="legend-label">Clave Foranea (vincula a otra tabla)</text>

  <text x="1030" y="710" class="legend-label">1:N = Una a muchos</text>
</svg>
